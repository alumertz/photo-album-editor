<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.14.1/themes/base/jquery-ui.min.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"/>
    <title>My Photo Album!</title>
</head>

<body>

    <div class="container-fluid screenonly">
        <div class="row">
            <div class="gallery col-2">
                
            </div>
            <div class="album col-7" data-cut-preview="false">
                
            </div>
            <div class="sidebar col-3">
                <div class="item">
                    <div class="caption-editor-wrapper">
                        <div id="caption-editor"></div>
                    </div>
                </div>

                <div class="item datebox-controls-wrapper">
                    <div class="datebox-controls">
                        <div class="controls-title">Date Box</div>
                        <div class="controls-body">
                            <label>Style</label>
                            <div class="d-flex flex-wrap gap-1 mb-3">
                                <button class="btn btn-sm btn-outline-light datebox-preset" data-preset="overlay">Overlay</button>
                                <button class="btn btn-sm btn-outline-light datebox-preset" data-preset="classic">Classic</button>
                                <button class="btn btn-sm btn-outline-light datebox-preset" data-preset="stamp">Stamp</button>
                                <button class="btn btn-sm btn-outline-light datebox-preset" data-preset="film">Film</button>
                            </div>
                            <label>Divider</label>
                            <div class="d-flex gap-1">
                                <button class="btn btn-sm btn-outline-light datebox-divider active" data-divider="/">/</button>
                                <button class="btn btn-sm btn-outline-light datebox-divider" data-divider="-">-</button>
                                <button class="btn btn-sm btn-outline-light datebox-divider" data-divider=".">.</button>
                                <button class="btn btn-sm btn-outline-light datebox-divider" data-divider="&#183;">·</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="item">
                    <div class="textbox-controls">
                        <div class="controls-title">Text Box</div>
                        <div class="controls-body">
                            <label>Background</label>
                            <div class="d-flex flex-wrap gap-2 align-items-center mb-2">
                                <input type="color" id="textbox-bg-color" value="#000000">
                                <input type="number" id="textbox-bg-opacity" min="0" max="100" value="67" step="5">
                                <span>%</span>
                            </div>
                            <div class="d-flex gap-2 mb-3">
                                <button class="btn btn-sm btn-outline-light flex-fill" id="textbox-bg-remove">Remove</button>
                                <button class="btn btn-sm btn-outline-light flex-fill" id="textbox-bg-default">Default</button>
                            </div>
                            <label>Size</label>
                            <select id="textbox-size" class="form-select form-select-sm">
                                <option value="">Auto</option>
                                <option value="2px 4px">XS</option>
                                <option value="3px 6px">S</option>
                                <option value="4px 8px">M</option>
                                <option value="5px 10px">L</option>
                                <option value="7px 13px">G</option>
                                <option value="10px 18px">XG</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="sidebar-bottom">
                    <div class="item d-flex gap-2 justify-content-center">
                        <button class="btn btn-secondary btn-save-album"><i class="fa fa-save me-2"></i>Save</button>
                        <button class="btn btn-secondary btn-print"><i class="fa fa-print me-2"></i>Print</button>
                    </div>
                    <div class="item d-flex gap-2 justify-content-center">
                        <button class="btn btn-outline-secondary btn-print-photo"><i class="fa fa-file-archive me-2"></i>Save JPG ZIP</button>
                    </div>
                    <div class="item">
                    </div>
                    <div class="item">
                        <button class="btn w-100 btn-outline-light btn-join-photos"><i class="fa fa-object-group me-2"></i>Join Photos</button>
                    </div>
                    <div class="item">
                        <button class="btn w-100 btn-outline-light btn-refresh-gallery">Refresh Gallery</button>
                    </div>
                    <div class="item">
                        <button class="btn w-100 btn-outline-light btn-toggle-marks">Show Cut Marks</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Join Photos Modal -->
    <div id="join-photos-modal" class="join-modal-overlay" style="display:none">
        <div class="join-modal">
            <div class="join-modal-header">
                <span>Join Photos</span>
                <button class="join-modal-close" id="join-modal-close">×</button>
            </div>
            <div class="join-modal-body">
                <div class="join-row mb-3">
                    <div class="join-field">
                        <label class="join-label">Photos per image</label>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-secondary join-count-btn active" data-count="2">2 Photos</button>
                            <button class="btn btn-sm btn-outline-secondary join-count-btn" data-count="4">4 Photos</button>
                        </div>
                    </div>
                    <div class="join-field">
                        <label class="join-label">Output size</label>
                        <select id="join-size-select" class="form-select form-select-sm">
                            <option value="10x15" selected>10×15 cm (4×6")</option>
                            <option value="9x13">9×13 cm (3.5×5")</option>
                            <option value="13x18">13×18 cm (5×7")</option>
                            <option value="15x20">15×20 cm (6×8")</option>
                            <option value="20x25">20×25 cm (8×10")</option>
                            <option value="20x30">20×30 cm (8×12")</option>
                        </select>
                    </div>
                </div>

                <p id="join-status" class="join-status"></p>

                <div id="join-crop-result" class="join-crop-result" style="display:none">
                    <label class="join-label join-label-warning">⚠ These photos were cropped to fit:</label>
                    <div id="join-crop-list" class="join-crop-list"></div>
                </div>
            </div>
            <div class="join-modal-footer">
                <button class="btn btn-outline-secondary" id="join-cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="join-process-btn">
                    <i class="fa fa-download me-1"></i>Process & Download ZIP
                </button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.14.1/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script type="module" src="main.js"></script>
</body>

</html>
